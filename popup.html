<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mindful Site Timer</title>
    <style>
      body {
        margin: 0;
        width: 280px;
        background: linear-gradient(145deg, #edf8ff, #dceffd);
        color: #17324a;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
      }

      .wrap {
        padding: 14px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.1rem;
      }

      p {
        margin: 0 0 12px;
        color: #4f6e87;
        font-size: 0.9rem;
      }

      button {
        width: 100%;
        border: 0;
        border-radius: 10px;
        padding: 10px;
        background: #2f7ecf;
        color: #fff;
        font-weight: 700;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Mindful Site Timer</h1>
      <p>Set sites and limits in Settings.</p>
      <button id="open-options">Open settings</button>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
